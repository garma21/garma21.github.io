<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Підписка на розсилку ЗВО сфери управління МОН</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2d3d;
            padding: 40px 20px;
        }

        .subscription-wrapper {
            max-width: 520px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #d9e2ec;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(15, 43, 77, 0.08);
            padding: 32px;
        }

        .subscription-title {
            font-size: 28px;
            font-weight: 700;
            color: #003b7a;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .subscription-text {
            font-size: 15px;
            line-height: 1.6;
            color: #52606d;
            margin-bottom: 24px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #102a43;
            margin-bottom: -6px;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #bcccdc;
            border-radius: 8px;
            font-size: 15px;
            color: #1f2933;
            background: #fff;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #0056b3;
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.12);
        }

        input::placeholder {
            color: #9aa5b1;
        }

        button {
            margin-top: 10px;
            padding: 14px 20px;
            background: #0056b3;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.25s ease, transform 0.2s ease;
        }

        button:hover {
            background: #004494;
        }

        button:active {
            transform: translateY(1px);
        }

        @media (max-width: 600px) {
            body {
                padding: 20px 12px;
            }

            .subscription-wrapper {
                padding: 24px 18px;
                border-radius: 10px;
            }

            .subscription-title {
                font-size: 22px;
            }

            .subscription-text {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="subscription-wrapper">
        <h1 class="subscription-title">Підписка на розсилку</h1>
        <p class="subscription-text">
            Підпишіться, щоб отримувати листи адресовані закладам вищої освіти(ЗВО) сфери управління
            МОН.
        </p>

        <!-- SendPulse Simple Subscription Form -->
        <form
            action="https://login.sendpulse.com/forms/simple/u/eyJ1c2VyX2lkIjo5MzY4NjUxLCJhZGRyZXNzX2Jvb2tfaWQiOjYxNjkwNywibGFuZyI6InVhIn0="
            method="post">
            <label for="name">Назва закладу</label>
            <input type="text" id="name" name="name" placeholder="Введіть назву закладу">

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="Введіть електронну адресу">

            <input type="hidden" name="sender" value="bW9uQG1vbi5nb3YudWE=">

            <button type="submit">Підписатися</button>
        </form>
        <!-- SendPulse Simple Subscription Form -->
    </div>
</body>

</html>
