<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін | Фермерський кошик</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        .image-thumb {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .multi-image-preview {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .preview-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
    </style>
</head>

<body class="bg-gray-50">
    <div class="max-w-6xl mx-auto p-6">
        <div class="flex justify-between items-center border-b pb-4 mb-6">
            <h1 class="text-2xl font-bold text-green-800"><i class="fas fa-leaf mr-2"></i>Адмінпанель</h1>
            <a href="index.html" target="_blank" class="text-sm bg-gray-200 px-3 py-1 rounded-full">Перейти до
                магазину</a>
        </div>

        <div id="loginScreen" class="bg-white p-8 rounded-2xl shadow-md max-w-md mx-auto text-center">
            <i class="fas fa-lock text-4xl text-amber-600 mb-3"></i>
            <h2 class="text-xl font-semibold">Доступ до адмінпанелі</h2>
            <input type="password" id="adminPassword" placeholder="Пароль"
                class="w-full border px-3 py-2 rounded-lg mt-4">
            <button id="loginBtn" class="mt-4 bg-green-600 text-white px-6 py-2 rounded-lg w-full">Увійти</button>
        </div>

        <div id="adminContent" class="hidden">
            <div class="flex gap-4 border-b mb-5">
                <button id="tabProducts" class="py-2 px-4 font-semibold text-green-700 border-b-2 border-green-600">📦
                    Товари</button>
                <button id="tabOrders" class="py-2 px-4 font-semibold text-gray-500">📋 Замовлення</button>
            </div>

            <div id="productsSection">
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="bg-white p-5 rounded-xl shadow">
                        <h3 class="font-bold text-lg mb-3">➕ Новий товар</h3>
                        <input type="text" id="prodName" placeholder="Назва" class="w-full border p-2 rounded mb-2">
                        <input type="number" id="prodPrice" placeholder="Ціна (грн/кг)"
                            class="w-full border p-2 rounded mb-2">
                        <input type="number" id="prodQuantity" placeholder="Кількість (кг)"
                            class="w-full border p-2 rounded mb-2">
                        <select id="prodCategory" class="w-full border p-2 rounded mb-2">
                            <option value="овочі">Овочі</option>
                            <option value="ягоди">Ягоди</option>
                        </select>
                        <div class="mb-2">
                            <label class="block text-sm font-medium">Фото (кілька URL або файлів)</label>
                            <textarea id="prodImagesUrls" rows="2"
                                placeholder="URL фото (кожен з нового рядка)"></textarea>
                            <input type="file" id="prodImagesFiles" multiple accept="image/*" class="mt-2">
                            <div id="imagePreviews" class="multi-image-preview"></div>
                        </div>
                        <button id="addProductBtn" class="bg-green-600 text-white w-full py-2 rounded-lg">➕
                            Додати</button>
                    </div>
                    <div class="bg-white p-5 rounded-xl shadow">
                        <h3 class="font-bold text-lg mb-3">📋 Редагувати товари</h3>
                        <div id="adminProductList" class="max-h-[500px] overflow-y-auto space-y-3"></div>
                    </div>
                </div>
            </div>

            <div id="ordersSection" class="hidden bg-white p-5 rounded-xl shadow">
                <h3 class="font-bold text-lg mb-3">Замовлення</h3>
                <div id="ordersList" class="space-y-4 max-h-[600px] overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script>
        // ВСТАВТЕ СЮДИ ТОЙ САМИЙ firebaseConfig, ЩО Й У index.html
        const firebaseConfig = {
            apiKey: "AIzaSyDfnd8GywyOO6g4DHroSayWggN8QcJ47iA",
            authDomain: "shpak-farmer.firebaseapp.com",
            projectId: "shpak-farmer",
            storageBucket: "shpak-farmer.firebasestorage.app",
            messagingSenderId: "994536266662",
            appId: "1:994536266662:web:0b3343b2ce971b8b508d67"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let products = [];

        async function loadProducts() {
            const snapshot = await db.collection('products').get();
            products = [];
            snapshot.forEach(doc => products.push({ id: doc.id, ...doc.data() }));
            renderAdminProducts();
        }

        function subscribeToProducts() {
            db.collection('products').onSnapshot(snapshot => {
                products = [];
                snapshot.forEach(doc => products.push({ id: doc.id, ...doc.data() }));
                renderAdminProducts();
            });
        }

        async function addProduct() {
            const name = document.getElementById('prodName').value.trim();
            const price = parseFloat(document.getElementById('prodPrice').value);
            const quantity = parseFloat(document.getElementById('prodQuantity').value);
            const category = document.getElementById('prodCategory').value;
            if (!name || isNaN(price) || isNaN(quantity) || price <= 0 || quantity < 0) { alert("Заповніть правильно"); return; }
            let images = [];
            const urlsText = document.getElementById('prodImagesUrls').value;
            if (urlsText.trim()) images = urlsText.split(/\r?\n/).filter(u => u.trim());
            const files = document.getElementById('prodImagesFiles').files;
            const fileReaders = [];
            if (files.length) {
                for (let file of files) {
                    const reader = new FileReader();
                    const promise = new Promise((resolve) => {
                        reader.onload = e => resolve(e.target.result);
                    });
                    reader.readAsDataURL(file);
                    fileReaders.push(promise);
                }
                const base64Images = await Promise.all(fileReaders);
                images.push(...base64Images);
            }
            if (images.length === 0) images = ['https://via.placeholder.com/400x200?text=Без+фото'];
            const newProduct = {
                name, price, quantity, category,
                blocked: quantity === 0,
                images: images,
                createdAt: new Date().toISOString()
            };
            await db.collection('products').add(newProduct);
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodQuantity').value = '';
            document.getElementById('prodImagesUrls').value = '';
            document.getElementById('prodImagesFiles').value = '';
            document.getElementById('imagePreviews').innerHTML = '';
            alert("Товар додано");
        }

        async function updateProductField(productId, field, value) {
            await db.collection('products').doc(productId).update({ [field]: value });
        }

        async function deleteProduct(productId) {
            if (confirm("Видалити товар?")) {
                await db.collection('products').doc(productId).delete();
            }
        }

        function renderAdminProducts() {
            const container = document.getElementById('adminProductList');
            if (!container) return;
            container.innerHTML = '';
            products.forEach(prod => {
                const div = document.createElement('div');
                div.className = 'border rounded-xl p-3 bg-gray-50';
                div.innerHTML = `
                <div class="flex flex-wrap gap-3 items-start">
                    <div class="flex-1">
                        <p class="font-semibold">${escapeHtml(prod.name)}</p>
                        <p class="text-sm">${prod.price} грн/кг | ${prod.quantity} кг | ${prod.category}</p>
                        <div class="flex gap-1 mt-1 flex-wrap">
                            ${(prod.images || []).slice(0, 3).map(img => `<img src="${img}" class="image-thumb" onerror="this.src='https://via.placeholder.com/60'">`).join('')}
                            ${prod.images?.length > 3 ? `<span class="text-xs text-gray-500">+${prod.images.length - 3}</span>` : ''}
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <input type="number" step="0.5" value="${prod.quantity}" class="w-24 border rounded p-1 text-sm qty-input" data-id="${prod.id}">
                        <button class="toggle-block px-3 py-1 rounded-full text-sm ${prod.blocked ? 'bg-green-200' : 'bg-red-200'}" data-id="${prod.id}">${prod.blocked ? 'Розблокувати' : 'Заблокувати'}</button>
                        <button class="edit-images bg-blue-100 px-3 py-1 rounded text-sm" data-id="${prod.id}"><i class="fas fa-images"></i> Фото</button>
                        <button class="delete-product bg-red-100 px-3 py-1 rounded text-sm" data-id="${prod.id}">Видалити</button>
                    </div>
                </div>
            `;
                container.appendChild(div);
                div.querySelector('.qty-input').addEventListener('change', (e) => {
                    const newQty = parseFloat(e.target.value);
                    if (!isNaN(newQty) && newQty >= 0) {
                        updateProductField(prod.id, 'quantity', newQty);
                        if (newQty === 0) updateProductField(prod.id, 'blocked', true);
                        else if (prod.blocked && newQty > 0) updateProductField(prod.id, 'blocked', false);
                    }
                });
                div.querySelector('.toggle-block').addEventListener('click', () => {
                    updateProductField(prod.id, 'blocked', !prod.blocked);
                });
                div.querySelector('.edit-images').addEventListener('click', () => {
                    let newUrls = prompt('Введіть URL фото (через кому або новий рядок):', (prod.images || []).join('\n'));
                    if (newUrls !== null) {
                        let urls = newUrls.split(/[ ,\n]+/).filter(u => u.trim());
                        if (urls.length === 0) urls = ['https://via.placeholder.com/400x200?text=Без+фото'];
                        updateProductField(prod.id, 'images', urls);
                    }
                });
                div.querySelector('.delete-product').addEventListener('click', () => deleteProduct(prod.id));
            });
        }

        async function renderOrders() {
            const container = document.getElementById('ordersList');
            if (!container) return;
            const snapshot = await db.collection('orders').orderBy('date', 'desc').get();
            if (snapshot.empty) { container.innerHTML = '<div class="text-gray-400 text-center">Немає замовлень</div>'; return; }
            container.innerHTML = '';
            snapshot.forEach(doc => {
                const order = doc.data();
                const div = document.createElement('div');
                div.className = 'border rounded-xl p-4 bg-white';
                div.innerHTML = `
                <div class="flex justify-between border-b pb-2"><span class="font-bold">№ ${order.id}</span><span>${new Date(order.date).toLocaleString()}</span><span class="bg-green-100 px-2 rounded">${order.status}</span></div>
                <div class="mt-2"><i class="fas fa-user"></i> ${escapeHtml(order.customer.name)} (${order.customer.phone})</div>
                <div><i class="fas fa-map-marker-alt"></i> ${escapeHtml(order.customer.address || 'не вказано')}</div>
                <div class="mt-2 text-sm"><span class="font-semibold">Товари:</span><ul class="list-disc ml-5">${order.items.map(i => `<li>${i.name} - ${i.quantity} кг × ${i.price} = ${i.total} грн</li>`).join('')}</ul></div>
                <div class="mt-2 flex justify-between"><span class="font-bold text-green-700">Сума: ${order.total} грн</span>${order.customer.comment ? `<span class="text-gray-500 text-sm"><i class="fas fa-comment"></i> ${escapeHtml(order.customer.comment)}</span>` : ''}</div>
            `;
                container.appendChild(div);
            });
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

        // Вкладки
        const productsSection = document.getElementById('productsSection');
        const ordersSection = document.getElementById('ordersSection');
        const tabProducts = document.getElementById('tabProducts');
        const tabOrders = document.getElementById('tabOrders');
        tabProducts.addEventListener('click', () => { productsSection.classList.remove('hidden'); ordersSection.classList.add('hidden'); tabProducts.classList.add('border-b-2', 'border-green-600', 'text-green-700'); tabProducts.classList.remove('text-gray-500'); tabOrders.classList.remove('border-b-2', 'border-green-600', 'text-green-700'); tabOrders.classList.add('text-gray-500'); });
        tabOrders.addEventListener('click', async () => { ordersSection.classList.remove('hidden'); productsSection.classList.add('hidden'); tabOrders.classList.add('border-b-2', 'border-green-600', 'text-green-700'); tabOrders.classList.remove('text-gray-500'); tabProducts.classList.remove('border-b-2', 'border-green-600', 'text-green-700'); tabProducts.classList.add('text-gray-500'); await renderOrders(); });

        document.getElementById('addProductBtn').addEventListener('click', addProduct);
        document.getElementById('loginBtn').addEventListener('click', () => {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === '1234') {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                subscribeToProducts();
                renderOrders();
            } else alert('Невірний пароль');
        });
        document.getElementById('prodImagesFiles').addEventListener('change', function (e) {
            const previewDiv = document.getElementById('imagePreviews');
            previewDiv.innerHTML = '';
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = ev => {
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    img.className = 'preview-img';
                    previewDiv.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });
    </script>
</body>

</html>
