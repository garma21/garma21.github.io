<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Особистий кабінет | Фермерський кошик</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        .toast-notify {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2c3e2f;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            z-index: 1000;
            animation: fadeInOut 4s ease forwards;
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            10% {
                opacity: 1;
                transform: translateY(0);
            }

            90% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                display: none;
            }
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-new {
            background: #fee2e2;
            color: #b91c1c;
        }

        .status-confirmed {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-shipped {
            background: #ffedd5;
            color: #9a3412;
        }

        .status-completed {
            background: #dcfce7;
            color: #166534;
        }

        .status-cancelled {
            background: #f3f4f6;
            color: #374151;
        }
    </style>
</head>

<body class="bg-gray-50">
    <div class="max-w-4xl mx-auto p-6">
        <!-- Шапка -->
        <div class="flex justify-between items-center border-b pb-4 mb-6">
            <div class="flex items-center gap-3">
                <i class="fas fa-user-circle text-3xl text-green-700"></i>
                <h1 class="text-2xl font-bold text-gray-800">Особистий кабінет</h1>
            </div>
            <div class="flex gap-2">
                <a href="index.html" class="text-sm bg-gray-200 px-3 py-1 rounded-full"><i class="fas fa-store"></i> На
                    головну</a>
                <button id="logoutBtn"
                    class="text-sm bg-red-100 text-red-700 px-3 py-1 rounded-full hover:bg-red-200"><i
                        class="fas fa-sign-out-alt"></i> Вийти</button>
            </div>
        </div>

        <!-- Інформація про користувача -->
        <div class="bg-white rounded-xl shadow p-5 mb-6">
            <h2 class="font-bold text-lg mb-2">👤 Мої дані</h2>
            <div id="userInfo" class="text-gray-600">Завантаження...</div>
        </div>

        <!-- Фільтри замовлень -->
        <div class="bg-white rounded-xl shadow p-5 mb-6">
            <h2 class="font-bold text-lg mb-3">📦 Мої замовлення</h2>
            <div class="flex gap-3 mb-4">
                <button id="filterAll" class="px-3 py-1 rounded-full bg-green-100 text-green-700">Всі</button>
                <button id="filterActive" class="px-3 py-1 rounded-full bg-gray-100 text-gray-700">Активні</button>
                <button id="filterCompleted" class="px-3 py-1 rounded-full bg-gray-100 text-gray-700">Виконані</button>
            </div>
            <div id="ordersList" class="space-y-4 max-h-[600px] overflow-y-auto">
                <p class="text-gray-400 text-center">Завантаження...</p>
            </div>
        </div>
    </div>

    <script>
        // ========== КОНФІГ FIREBASE (ВСТАВТЕ СВІЙ) ==========
        const firebaseConfig = {
            apiKey: "AIzaSyDfnd8GywyOO6g4DHroSayWggN8QcJ47iA",
            authDomain: "shpak-farmer.firebaseapp.com",
            projectId: "shpak-farmer",
            storageBucket: "shpak-farmer.firebasestorage.app",
            messagingSenderId: "994536266662",
            appId: "1:994536266662:web:0b3343b2ce971b8b508d67"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let ordersUnsubscribe = null;
        let currentFilter = 'all'; // 'all', 'active', 'completed'

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast-notify';
            toast.innerHTML = `<i class="fas fa-info-circle mr-2"></i>${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])) || ''; }

        // Визначення, чи замовлення активне (ще не виконане і не скасоване)
        function isActiveOrder(order) {
            return order.status !== 'виконано' && order.status !== 'скасовано';
        }

        // Завантаження замовлень покупця (підписка в реальному часі)
        function loadOrders(buyerId) {
            if (ordersUnsubscribe) ordersUnsubscribe();
            const q = db.collection('orders').where('buyerId', '==', buyerId).orderBy('createdAt', 'desc');
            ordersUnsubscribe = q.onSnapshot(snapshot => {
                if (snapshot.empty) {
                    document.getElementById('ordersList').innerHTML = '<p class="text-gray-400 text-center">У вас поки що немає замовлень.</p>';
                    return;
                }
                // Групуємо за batchOrderId
                const groups = new Map();
                snapshot.forEach(doc => {
                    const order = doc.data();
                    const batchId = order.batchOrderId;
                    if (!groups.has(batchId)) groups.set(batchId, []);
                    groups.get(batchId).push({ id: doc.id, ...order });
                });
                // Фільтруємо групи залежно від активного фільтра
                let filteredGroups = Array.from(groups.entries());
                if (currentFilter === 'active') {
                    filteredGroups = filteredGroups.filter(([_, suborders]) => suborders.some(o => isActiveOrder(o)));
                } else if (currentFilter === 'completed') {
                    filteredGroups = filteredGroups.filter(([_, suborders]) => suborders.every(o => !isActiveOrder(o)));
                }
                if (filteredGroups.length === 0) {
                    document.getElementById('ordersList').innerHTML = '<p class="text-gray-400 text-center">Немає замовлень за вибраним фільтром.</p>';
                    return;
                }
                let html = '';
                for (let [batchId, suborders] of filteredGroups) {
                    const first = suborders[0];
                    const date = new Date(first.createdAt).toLocaleString();
                    const total = suborders.reduce((sum, o) => sum + o.subtotal, 0);
                    const allCompleted = suborders.every(o => o.status === 'виконано');
                    const anyActive = suborders.some(o => isActiveOrder(o));
                    let statusBadge = '';
                    if (allCompleted) statusBadge = '<span class="status-badge status-completed">Виконано</span>';
                    else if (anyActive) statusBadge = '<span class="status-badge status-new">Активне</span>';
                    else statusBadge = '<span class="status-badge status-cancelled">Завершено</span>';
                    html += `
                        <div class="border rounded-xl p-4 bg-white shadow-sm">
                            <div class="flex justify-between flex-wrap items-start gap-2 border-b pb-2">
                                <div><span class="font-bold">№ ${batchId.slice(-6)}</span><span class="text-sm text-gray-500 ml-2">${date}</span></div>
                                <div>${statusBadge} <span class="font-bold ml-2">${total} грн</span></div>
                            </div>
                            <div class="mt-2 text-sm">Продавці: ${suborders.map(o => o.sellerId.slice(-6)).join(', ')}</div>
                            <button class="view-details-btn text-green-600 text-sm mt-2" data-batch="${batchId}">Детальніше</button>
                            <div id="details-${batchId}" class="hidden mt-3 text-sm border-t pt-2 space-y-2">
                                ${suborders.map(o => `
                                    <div class="bg-gray-50 p-2 rounded">
                                        <div><strong>Продавець:</strong> ${o.sellerId}</div>
                                        <div><strong>Статус:</strong> ${o.status}</div>
                                        <div><strong>Товари:</strong> ${o.items.map(i => `${i.name} (${i.quantity}кг)`).join(', ')}</div>
                                        <div><strong>Адреса:</strong> ${o.customer?.address || 'не вказано'}</div>
                                        ${o.customer?.comment ? `<div><strong>Коментар:</strong> ${escapeHtml(o.customer.comment)}</div>` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
                document.getElementById('ordersList').innerHTML = html;
                document.querySelectorAll('.view-details-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const batchId = btn.getAttribute('data-batch');
                        const detailsDiv = document.getElementById(`details-${batchId}`);
                        detailsDiv.classList.toggle('hidden');
                    });
                });
            });
        }

        // Отримання інформації про користувача
        async function loadUserInfo(user) {
            const userDoc = await db.collection('users').doc(user.uid).get();
            const data = userDoc.data();
            const email = user.email;
            const name = data?.displayName || 'Покупець';
            document.getElementById('userInfo').innerHTML = `
                <div><i class="fas fa-envelope"></i> ${escapeHtml(email)}</div>
                <div><i class="fas fa-user"></i> ${escapeHtml(name)}</div>
                <div><i class="fas fa-calendar-alt"></i> На сайті з ${new Date(data?.createdAt).toLocaleDateString()}</div>
            `;
        }

        // Вихід
        async function logout() {
            await auth.signOut();
            window.location.href = 'index.html';
        }

        // Налаштування фільтрів
        function setupFilters() {
            document.getElementById('filterAll').addEventListener('click', () => {
                currentFilter = 'all';
                document.querySelectorAll('.rounded-full').forEach(btn => btn.classList.remove('bg-green-100', 'text-green-700', 'bg-gray-100', 'text-gray-700'));
                document.getElementById('filterAll').classList.add('bg-green-100', 'text-green-700');
                if (currentUser) loadOrders(currentUser.uid);
            });
            document.getElementById('filterActive').addEventListener('click', () => {
                currentFilter = 'active';
                document.querySelectorAll('.rounded-full').forEach(btn => btn.classList.remove('bg-green-100', 'text-green-700', 'bg-gray-100', 'text-gray-700'));
                document.getElementById('filterActive').classList.add('bg-green-100', 'text-green-700');
                if (currentUser) loadOrders(currentUser.uid);
            });
            document.getElementById('filterCompleted').addEventListener('click', () => {
                currentFilter = 'completed';
                document.querySelectorAll('.rounded-full').forEach(btn => btn.classList.remove('bg-green-100', 'text-green-700', 'bg-gray-100', 'text-gray-700'));
                document.getElementById('filterCompleted').classList.add('bg-green-100', 'text-green-700');
                if (currentUser) loadOrders(currentUser.uid);
            });
        }

        document.getElementById('logoutBtn').addEventListener('click', logout);

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            const userDoc = await db.collection('users').doc(user.uid).get();
            const role = userDoc.exists ? userDoc.data().role : null;
            if (role !== 'customer') {
                alert("Ця сторінка тільки для покупців.");
                window.location.href = 'index.html';
                return;
            }
            loadUserInfo(user);
            loadOrders(user.uid);
            setupFilters();
        });
    </script>
</body>

</html>
