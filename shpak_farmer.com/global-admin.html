<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глобальна адмінпанель | Фермерський кошик</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        .toast-notify {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2c3e2f;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            z-index: 1000;
            animation: fadeInOut 4s ease forwards;
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            10% {
                opacity: 1;
                transform: translateY(0);
            }

            90% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                display: none;
            }
        }

        .status-select {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 20px;
            background: white;
            border: 1px solid #ccc;
        }

        .filter-panel {
            background: #f9fafb;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 150px;
        }

        .filter-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #374151;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
        }

        .btn-reset {
            background: #6b7280;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
        }

        .product-thumb {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>

<body class="bg-gray-50">
    <div class="max-w-6xl mx-auto p-6">
        <div id="loginScreen" class="bg-white p-8 rounded-2xl shadow-md max-w-md mx-auto text-center">
            <i class="fas fa-lock text-4xl text-amber-600 mb-3"></i>
            <h2 class="text-xl font-semibold">Вхід в глобальну адмінпанель</h2>
            <input type="email" id="adminEmail" placeholder="Email" class="w-full border px-3 py-2 rounded-lg mt-4">
            <input type="password" id="adminPassword" placeholder="Пароль"
                class="w-full border px-3 py-2 rounded-lg mt-2">
            <button id="loginBtn" class="mt-4 bg-green-600 text-white px-6 py-2 rounded-lg w-full">Увійти</button>
            <div id="loginMessage" class="text-red-500 text-sm mt-2"></div>
        </div>

        <div id="accessDenied" class="hidden bg-white p-8 rounded-2xl shadow-md text-center">
            <i class="fas fa-ban text-5xl text-red-500 mb-3"></i>
            <h2 class="text-2xl font-bold">Доступ заборонено</h2>
            <p class="text-gray-600 mt-2">Ви не маєте прав адміністратора.</p>
            <button id="logoutBtn" class="mt-4 bg-gray-300 px-4 py-2 rounded-lg">Вийти</button>
        </div>

        <div id="adminContent" class="hidden">
            <div class="flex justify-between items-center border-b pb-4 mb-6">
                <h1 class="text-2xl font-bold text-green-800"><i class="fas fa-globe mr-2"></i>Глобальна адмінпанель
                </h1>
                <button id="logoutAdminBtn" class="text-sm bg-gray-200 px-3 py-1 rounded-full">Вийти</button>
            </div>
            <div class="flex gap-4 border-b mb-5">
                <button id="tabSellers" class="py-2 px-4 font-semibold text-green-700 border-b-2 border-green-600">🏪
                    Продавці</button>
                <button id="tabProducts" class="py-2 px-4 font-semibold text-gray-500">📦 Товари</button>
                <button id="tabOrders" class="py-2 px-4 font-semibold text-gray-500">📋 Замовлення</button>
                <button id="tabAnalytics" class="py-2 px-4 font-semibold text-gray-500">📊 Аналітика</button>
            </div>

            <div id="sellersSection">
                <div class="bg-white p-5 rounded-xl shadow">
                    <h3 class="font-bold text-lg mb-3">Керування продавцями</h3>
                    <div id="sellersList" class="space-y-3 max-h-[600px] overflow-y-auto"></div>
                </div>
            </div>

            <div id="allProductsSection" class="hidden bg-white p-5 rounded-xl shadow">
                <h3 class="font-bold text-lg mb-3">Усі товари (всіх продавців)</h3>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Фільтр за продавцем</label>
                    <select id="filterProductSeller" class="w-full md:w-1/3 border rounded-lg px-3 py-2">
                        <option value="">Всі продавці</option>
                    </select>
                </div>
                <div id="allProductsList" class="space-y-3 max-h-[600px] overflow-y-auto"></div>
            </div>

            <div id="ordersSection" class="hidden bg-white p-5 rounded-xl shadow">
                <h3 class="font-bold text-lg mb-3">Всі замовлення</h3>
                <div class="filter-panel">
                    <div class="filter-group">
                        <label>Мінімальна сума (грн)</label>
                        <input type="number" id="filterMinPrice" placeholder="0">
                    </div>
                    <div class="filter-group">
                        <label>Максимальна сума (грн)</label>
                        <input type="number" id="filterMaxPrice" placeholder="10000">
                    </div>
                    <div class="filter-group">
                        <label>Продавець (ID або назва)</label>
                        <input type="text" id="filterSeller" placeholder="sellerId або назва магазину">
                    </div>
                    <div class="filter-group">
                        <label>Від дати</label>
                        <input type="datetime-local" id="filterDateFrom">
                    </div>
                    <div class="filter-group">
                        <label>До дати</label>
                        <input type="datetime-local" id="filterDateTo">
                    </div>
                    <div class="filter-group">
                        <button id="resetFiltersBtn" class="btn-reset">Скинути фільтри</button>
                    </div>
                </div>
                <div id="ordersList" class="space-y-4 max-h-[600px] overflow-y-auto"></div>
            </div>

            <div id="analyticsSection" class="hidden bg-white p-5 rounded-xl shadow">
                <h3 class="font-bold text-lg mb-3">📊 Статистика маркетплейсу</h3>
                <div class="grid md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-green-50 p-4 rounded-xl text-center">
                        <p class="text-gray-500">Всього продавців</p>
                        <p id="totalSellers" class="text-3xl font-bold text-green-700">0</p>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-xl text-center">
                        <p class="text-gray-500">Всього замовлень</p>
                        <p id="totalOrders" class="text-3xl font-bold text-blue-700">0</p>
                    </div>
                    <div class="bg-purple-50 p-4 rounded-xl text-center">
                        <p class="text-gray-500">Загальна виручка</p>
                        <p id="totalRevenue" class="text-3xl font-bold text-purple-700">0 грн</p>
                    </div>
                </div>
                <button id="exportCsvBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg"><i
                        class="fas fa-download"></i> Експорт замовлень (CSV)</button>
            </div>
        </div>
    </div>

    <!-- Модал редагування товару -->
    <div id="editProductModal"
        class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl max-w-2xl w-full mx-4 max-h-[85vh] flex flex-col shadow-2xl">
            <div class="flex justify-between items-center p-5 border-b">
                <h3 class="text-xl font-bold"><i class="fas fa-edit text-green-600 mr-2"></i>Редагування товару (адмін)
                </h3>
                <button id="closeEditProductModalBtn" class="text-gray-500 hover:text-black text-2xl">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto p-5">
                <input type="text" id="editProdName" placeholder="Назва" class="w-full border p-2 rounded mb-2">
                <input type="number" id="editProdPrice" placeholder="Ціна (грн/кг)"
                    class="w-full border p-2 rounded mb-2">
                <input type="number" id="editProdQuantity" placeholder="Кількість (кг)"
                    class="w-full border p-2 rounded mb-2">
                <select id="editProdCategory" class="w-full border p-2 rounded mb-2">
                    <option value="овочі">Овочі</option>
                    <option value="ягоди">Ягоди</option>
                    <option value="фрукти">Фрукти</option>
                    <option value="зелень">Зелень та трави</option>
                    <option value="горіхи">Горіхи та насіння</option>
                    <option value="мед">Мед та продукти бджільництва</option>
                </select>
                <textarea id="editProdDescription" rows="3" placeholder="Опис товару"
                    class="w-full border p-2 rounded mb-2"></textarea>
                <label class="block text-sm font-medium mb-1">Зображення (URL, кожен з нового рядка)</label>
                <textarea id="editProdImagesUrls" rows="3"
                    placeholder="https://example.com/photo1.jpg\nhttps://example.com/photo2.jpg"
                    class="w-full border p-2 rounded"></textarea>
            </div>
            <div class="p-4 border-t bg-gray-50 flex justify-end gap-3">
                <button id="cancelEditProductBtn"
                    class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg">Скасувати</button>
                <button id="saveEditProductBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg">Зберегти
                    зміни</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- КОНФІГ FIREBASE (ВСТАВТЕ СВІЙ) ----------
        const firebaseConfig = {
            apiKey: "AIzaSyDfnd8GywyOO6g4DHroSayWggN8QcJ47iA",
            authDomain: "shpak-farmer.firebaseapp.com",
            projectId: "shpak-farmer",
            storageBucket: "shpak-farmer.firebasestorage.app",
            messagingSenderId: "994536266662",
            appId: "1:994536266662:web:0b3343b2ce971b8b508d67"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentAdmin = null;
        let sellersUnsubscribe = null;
        let ordersUnsubscribe = null;
        let allOrdersRaw = [];
        let sellersCache = new Map();
        let allProducts = [];
        let productsUnsubscribe = null;
        let currentEditProductId = null;
        let currentProductSellerFilter = '';

        async function loadSellersCache() {
            const snapshot = await db.collection('sellers').get();
            sellersCache.clear();
            const select = document.getElementById('filterProductSeller');
            if (select) {
                select.innerHTML = '<option value="">Всі продавці</option>';
            }
            snapshot.forEach(doc => {
                const storeName = doc.data().storeName;
                sellersCache.set(doc.id, storeName);
                if (select) {
                    const option = document.createElement('option');
                    option.value = doc.id;
                    option.textContent = storeName;
                    select.appendChild(option);
                }
            });
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast-notify';
            toast.innerHTML = `<i class="fas fa-info-circle mr-2"></i>${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function checkAdminRole(user) {
            if (!user) return false;
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists && userDoc.data().role === 'admin') return true;
            return false;
        }

        async function logout() {
            await auth.signOut();
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('accessDenied').classList.add('hidden');
            document.getElementById('adminContent').classList.add('hidden');
            if (sellersUnsubscribe) sellersUnsubscribe();
            if (ordersUnsubscribe) ordersUnsubscribe();
            if (productsUnsubscribe) productsUnsubscribe();
        }

        function loadSellers() {
            if (sellersUnsubscribe) sellersUnsubscribe();
            sellersUnsubscribe = db.collection('sellers').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                const container = document.getElementById('sellersList');
                if (!container) return;
                if (snapshot.empty) { container.innerHTML = '<div class="text-gray-400 text-center">Немає продавців</div>'; return; }
                let html = '';
                snapshot.forEach(doc => {
                    const seller = doc.data();
                    html += `<div class="border rounded-xl p-4 bg-gray-50">
                        <div class="flex justify-between items-start flex-wrap">
                            <div>
                                <h4 class="font-bold text-lg">${escapeHtml(seller.storeName)}</h4>
                                <p class="text-sm text-gray-600">${escapeHtml(seller.description || '')}</p>
                                <p class="text-xs text-gray-400">Статус: ${seller.status}</p>
                                <p class="text-xs">ID: ${doc.id}</p>
                            </div>
                            <div class="flex gap-2">
                                <select class="status-select border rounded px-2 py-1 text-sm" data-id="${doc.id}" data-current="${seller.status}">
                                    <option value="active" ${seller.status === 'active' ? 'selected' : ''}>Активний</option>
                                    <option value="blocked" ${seller.status === 'blocked' ? 'selected' : ''}>Заблокований</option>
                                </select>
                            </div>
                        </div>
                    </div>`;
                });
                container.innerHTML = html;
                document.querySelectorAll('.status-select').forEach(select => {
                    select.addEventListener('change', async (e) => {
                        const sellerId = select.getAttribute('data-id');
                        const newStatus = select.value;
                        await db.collection('sellers').doc(sellerId).update({ status: newStatus });
                        showToast(`Статус продавця змінено на ${newStatus}`);
                    });
                });
                loadSellersCache();
            });
        }

        function loadAllProducts() {
            if (productsUnsubscribe) productsUnsubscribe();
            productsUnsubscribe = db.collection('products').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                allProducts = [];
                snapshot.forEach(doc => allProducts.push({ id: doc.id, ...doc.data() }));
                renderAllProducts();
            });
        }

        function getFilteredProducts() {
            if (!currentProductSellerFilter) return allProducts;
            return allProducts.filter(p => p.sellerId === currentProductSellerFilter);
        }

        function attachProductEventHandlers() {
            document.querySelectorAll('.edit-product-admin').forEach(btn => {
                btn.addEventListener('click', () => openEditProductModal(btn.getAttribute('data-id')));
            });
            document.querySelectorAll('.toggle-block-admin').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = btn.getAttribute('data-id');
                    const prod = allProducts.find(p => p.id === id);
                    if (prod) {
                        await db.collection('products').doc(id).update({ blocked: !prod.blocked });
                        showToast(`Товар ${!prod.blocked ? 'заблоковано' : 'розблоковано'}`);
                    }
                });
            });
            document.querySelectorAll('.delete-product-admin').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if (confirm("Видалити товар?")) {
                        await db.collection('products').doc(btn.getAttribute('data-id')).delete();
                        showToast("Товар видалено");
                    }
                });
            });
        }

        function renderAllProducts() {
            const container = document.getElementById('allProductsList');
            if (!container) return;
            const filtered = getFilteredProducts();
            if (filtered.length === 0) {
                container.innerHTML = '<div class="text-gray-400 text-center">Немає товарів за вибраним фільтром</div>';
                return;
            }
            let html = '';
            filtered.forEach(prod => {
                const sellerName = sellersCache.get(prod.sellerId) || prod.sellerId;
                html += `
                    <div class="border rounded-xl p-3 bg-gray-50">
                        <div class="flex flex-wrap gap-3 items-start">
                            <div class="flex-1">
                                <p class="font-semibold">${escapeHtml(prod.name)}</p>
                                <p class="text-sm text-gray-600">${escapeHtml(prod.description || '')}</p>
                                <div class="flex gap-2 mt-1 flex-wrap items-center">
                                    <span class="text-sm">Ціна: ${prod.price} грн/кг</span>
                                    <span class="text-sm">Кількість: ${prod.quantity} кг</span>
                                    <span class="text-xs bg-gray-200 px-2 rounded">${prod.category}</span>
                                </div>
                                <div class="text-xs text-gray-500 mt-1">Продавець: ${escapeHtml(sellerName)} (${prod.sellerId})</div>
                                <div class="flex gap-1 mt-2 flex-wrap">
                                    ${(prod.images || []).slice(0, 3).map(img => `<img src="${img}" class="product-thumb" onerror="this.src='https://via.placeholder.com/60'">`).join('')}
                                </div>
                            </div>
                            <div class="flex flex-col gap-2">
                                <button class="edit-product-admin bg-purple-100 px-3 py-1 rounded text-sm" data-id="${prod.id}"><i class="fas fa-pen"></i> Редагувати</button>
                                <button class="toggle-block-admin px-3 py-1 rounded-full text-sm ${prod.blocked ? 'bg-green-200' : 'bg-red-200'}" data-id="${prod.id}">${prod.blocked ? 'Розблокувати' : 'Заблокувати'}</button>
                                <button class="delete-product-admin bg-red-100 px-3 py-1 rounded text-sm" data-id="${prod.id}">Видалити</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            attachProductEventHandlers();
        }

        function openEditProductModal(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;
            currentEditProductId = productId;
            document.getElementById('editProdName').value = product.name || '';
            document.getElementById('editProdPrice').value = product.price || '';
            document.getElementById('editProdQuantity').value = product.quantity || '';
            document.getElementById('editProdCategory').value = product.category || 'овочі';
            document.getElementById('editProdDescription').value = product.description || '';
            document.getElementById('editProdImagesUrls').value = (product.images || []).join('\n');
            document.getElementById('editProductModal').classList.remove('hidden');
        }

        async function saveEditProductAdmin() {
            const name = document.getElementById('editProdName').value.trim();
            const price = parseFloat(document.getElementById('editProdPrice').value);
            const quantity = parseFloat(document.getElementById('editProdQuantity').value);
            const category = document.getElementById('editProdCategory').value;
            const description = document.getElementById('editProdDescription').value.trim();
            const imagesText = document.getElementById('editProdImagesUrls').value;
            let images = imagesText.split(/\r?\n/).filter(u => u.trim());
            if (images.length === 0) images = ['https://via.placeholder.com/400x200?text=Без+фото'];
            if (!name || isNaN(price) || isNaN(quantity) || price <= 0 || quantity < 0) { alert("Заповніть коректно"); return; }
            await db.collection('products').doc(currentEditProductId).update({ name, price, quantity, category, description, images, blocked: quantity === 0 });
            document.getElementById('editProductModal').classList.add('hidden');
            showToast("Товар оновлено");
        }

        function loadAllOrdersRaw() {
            if (ordersUnsubscribe) ordersUnsubscribe();
            ordersUnsubscribe = db.collection('orders').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                allOrdersRaw = [];
                snapshot.forEach(doc => allOrdersRaw.push({ id: doc.id, ...doc.data() }));
                applyOrdersFilters();
                if (!document.getElementById('analyticsSection').classList.contains('hidden')) loadAnalytics();
            });
        }

        function getFilteredOrders() {
            const minPrice = parseFloat(document.getElementById('filterMinPrice').value);
            const maxPrice = parseFloat(document.getElementById('filterMaxPrice').value);
            const sellerQuery = document.getElementById('filterSeller').value.trim().toLowerCase();
            const dateFrom = document.getElementById('filterDateFrom').value;
            const dateTo = document.getElementById('filterDateTo').value;
            return allOrdersRaw.filter(order => {
                const subtotal = order.subtotal || 0;
                if (!isNaN(minPrice) && subtotal < minPrice) return false;
                if (!isNaN(maxPrice) && subtotal > maxPrice) return false;
                if (sellerQuery) {
                    const sellerId = order.sellerId || '';
                    const sellerName = sellersCache.get(sellerId) || '';
                    if (!sellerId.toLowerCase().includes(sellerQuery) && !sellerName.toLowerCase().includes(sellerQuery)) return false;
                }
                const orderDate = new Date(order.createdAt);
                if (dateFrom && orderDate < new Date(dateFrom)) return false;
                if (dateTo && orderDate > new Date(dateTo)) return false;
                return true;
            });
        }

        function applyOrdersFilters() {
            const container = document.getElementById('ordersList');
            if (!container) return;
            const filtered = getFilteredOrders();
            if (filtered.length === 0) { container.innerHTML = '<div class="text-gray-400 text-center">Немає замовлень</div>'; return; }
            let html = '';
            filtered.forEach(order => {
                const sellerName = sellersCache.get(order.sellerId) || order.sellerId;
                html += `<div class="border rounded-xl p-4 bg-white">
                            <div class="flex justify-between border-b pb-2">
                                <div><span class="font-bold">№ ${(order.batchOrderId || order.id).slice(-6)}</span> <span class="text-sm text-gray-500">${new Date(order.createdAt).toLocaleString()}</span></div>
                                <div><span class="text-sm font-semibold">Сума: ${order.subtotal} грн</span></div>
                            </div>
                            <div class="mt-2"><i class="fas fa-store"></i> Продавець: ${escapeHtml(sellerName)} (${order.sellerId})</div>
                            <div><i class="fas fa-user"></i> Покупець: ${escapeHtml(order.customer?.name)} (${order.customer?.phone})</div>
                            <div class="text-sm">Товари: ${order.items.map(i => `${i.name} (${i.quantity}кг)`).join(', ')}</div>
                            <div class="text-xs text-gray-500 mt-1">Статус: ${order.status}</div>
                        </div>`;
            });
            container.innerHTML = html;
        }

        async function loadAnalytics() {
            const sellersSnap = await db.collection('sellers').get();
            document.getElementById('totalSellers').innerText = sellersSnap.size;
            const ordersSnap = await db.collection('orders').get();
            document.getElementById('totalOrders').innerText = ordersSnap.size;
            let revenue = 0;
            ordersSnap.forEach(doc => revenue += doc.data().subtotal || 0);
            document.getElementById('totalRevenue').innerText = revenue.toFixed(0) + ' грн';
        }

        document.getElementById('exportCsvBtn')?.addEventListener('click', async () => {
            const filtered = getFilteredOrders();
            const headers = ["ID", "Дата", "Продавець", "Покупець", "Телефон", "Сума", "Статус", "Товари"];
            const rows = filtered.map(o => [
                `="${o.batchOrderId || o.id}"`,
                new Date(o.createdAt).toLocaleString(),
                sellersCache.get(o.sellerId) || o.sellerId,
                o.customer?.name || '',
                o.customer?.phone || '',
                o.subtotal,
                o.status,
                o.items.map(i => `${i.name} (${i.quantity}кг)`).join('; ')
            ]);
            const csvContent = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(';')).join('\n');
            const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute("download", `orders_filtered_${new Date().toISOString().slice(0, 19)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });

        function bindFilterEvents() {
            const filterInputs = ['filterMinPrice', 'filterMaxPrice', 'filterSeller', 'filterDateFrom', 'filterDateTo'];
            filterInputs.forEach(id => {
                document.getElementById(id).addEventListener('input', () => applyOrdersFilters());
                document.getElementById(id).addEventListener('change', () => applyOrdersFilters());
            });
            document.getElementById('resetFiltersBtn').addEventListener('click', () => {
                document.getElementById('filterMinPrice').value = '';
                document.getElementById('filterMaxPrice').value = '';
                document.getElementById('filterSeller').value = '';
                document.getElementById('filterDateFrom').value = '';
                document.getElementById('filterDateTo').value = '';
                applyOrdersFilters();
            });
        }

        function bindProductFilter() {
            const filterSelect = document.getElementById('filterProductSeller');
            if (filterSelect) {
                filterSelect.addEventListener('change', (e) => {
                    currentProductSellerFilter = e.target.value;
                    renderAllProducts();
                });
            }
        }

        const sellersSection = document.getElementById('sellersSection');
        const allProductsSection = document.getElementById('allProductsSection');
        const ordersSection = document.getElementById('ordersSection');
        const analyticsSection = document.getElementById('analyticsSection');
        const tabSellers = document.getElementById('tabSellers');
        const tabProducts = document.getElementById('tabProducts');
        const tabOrders = document.getElementById('tabOrders');
        const tabAnalytics = document.getElementById('tabAnalytics');

        function setActiveTab(active) {
            [tabSellers, tabProducts, tabOrders, tabAnalytics].forEach(tab => {
                tab.classList.remove('border-b-2', 'border-green-600', 'text-green-700');
                tab.classList.add('text-gray-500');
            });
            [sellersSection, allProductsSection, ordersSection, analyticsSection].forEach(s => s.classList.add('hidden'));
            if (active === 'sellers') {
                tabSellers.classList.add('border-b-2', 'border-green-600', 'text-green-700');
                sellersSection.classList.remove('hidden');
                loadSellers();
            } else if (active === 'products') {
                tabProducts.classList.add('border-b-2', 'border-green-600', 'text-green-700');
                allProductsSection.classList.remove('hidden');
                if (allProducts.length === 0) loadAllProducts();
                else renderAllProducts();
                bindProductFilter();
                if (sellersCache.size === 0) loadSellersCache();
            } else if (active === 'orders') {
                tabOrders.classList.add('border-b-2', 'border-green-600', 'text-green-700');
                ordersSection.classList.remove('hidden');
                if (allOrdersRaw.length === 0) loadAllOrdersRaw();
                else applyOrdersFilters();
            } else if (active === 'analytics') {
                tabAnalytics.classList.add('border-b-2', 'border-green-600', 'text-green-700');
                analyticsSection.classList.remove('hidden');
                loadAnalytics();
            }
        }

        tabSellers.addEventListener('click', () => setActiveTab('sellers'));
        tabProducts.addEventListener('click', () => setActiveTab('products'));
        tabOrders.addEventListener('click', () => setActiveTab('orders'));
        tabAnalytics.addEventListener('click', () => setActiveTab('analytics'));

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value.trim();
            const msgDiv = document.getElementById('loginMessage');
            if (!email || !password) { msgDiv.innerText = 'Введіть email та пароль'; return; }
            try {
                const cred = await auth.signInWithEmailAndPassword(email, password);
                const isAdmin = await checkAdminRole(cred.user);
                if (!isAdmin) {
                    await auth.signOut();
                    msgDiv.innerText = 'Цей обліковий запис не має прав адміністратора.';
                    return;
                }
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                await loadSellersCache();
                setActiveTab('sellers');
                bindFilterEvents();
            } catch (err) { msgDiv.innerText = err.message; }
        });

        document.getElementById('logoutAdminBtn')?.addEventListener('click', logout);
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('closeEditProductModalBtn')?.addEventListener('click', () => document.getElementById('editProductModal').classList.add('hidden'));
        document.getElementById('cancelEditProductBtn')?.addEventListener('click', () => document.getElementById('editProductModal').classList.add('hidden'));
        document.getElementById('saveEditProductBtn')?.addEventListener('click', saveEditProductAdmin);

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const isAdmin = await checkAdminRole(user);
                if (isAdmin) {
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('adminContent').classList.remove('hidden');
                    await loadSellersCache();
                    setActiveTab('sellers');
                    bindFilterEvents();
                } else {
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('accessDenied').classList.remove('hidden');
                }
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('accessDenied').classList.add('hidden');
                document.getElementById('adminContent').classList.add('hidden');
            }
        });

        function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])) || ''; }
    </script>
</body>

</html>
